<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Duel: Mobile</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div id="app">
        <!-- СТАТУС БАР -->
        <header class="status-bar">
            <div class="player-stats">
                <span class="label">ВЫ (Lvl <span id="p-lvl">1</span>)</span>
                <div class="money" id="p-money">2000₮</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="enemy-stats">
                <span class="label">AI (Lvl <span id="e-lvl">1</span>)</span>
                <div class="money" id="e-money">2000₮</div>
            </div>
        </header>

        <!-- КАРТА СЕКТОРОВ -->
        <main id="map">
            <div class="core-mini">
                <div id="ray"></div>
                <div id="cycle-num">1</div>
            </div>
            <div id="sectors">
                <div class="sector" id="s1"><span>S1</span><div class="units"></div></div>
                <div class="sector" id="s2"><span>S2</span><div class="units"></div></div>
                <div class="sector" id="s3"><span>S3</span><div class="units"></div></div>
                <div class="sector" id="s4"><span>S4</span><div class="units"></div></div>
            </div>
        </main>

        <!-- ЛОГ СОБЫТИЙ -->
        <div id="mini-log">Система готова к запуску...</div>

        <!-- УПРАВЛЕНИЕ -->
        <nav class="controls">
            <div class="tabs">
                <button onclick="showTab('buy')">🏢 База</button>
                <button onclick="showTab('work')">⛏️ Добыча</button>
                <button onclick="showTab('sell')">💰 Рынок</button>
            </div>
            <div class="action-zone" id="action-zone">
                <p>Выберите действие выше или</p>
                <button id="ai-toggle" class="btn-ai">🤖 ВКЛЮЧИТЬ АВТОПИЛОТ</button>
            </div>
        </nav>
    </div>
    <script src="game.js"></script>
</body>
</html>
