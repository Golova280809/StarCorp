<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Duel: Fix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="status-bar">
            <div class="player-stats">
                <span class="label">ВЫ (Lvl <span id="p-lvl">1</span>)</span>
                <div class="money" id="p-money">2000₮</div>
                <div class="inv">Груз: <span id="p-inv">0</span></div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="enemy-stats">
                <span class="label">AI (Lvl <span id="e-lvl">1</span>)</span>
                <div class="money" id="e-money">2000₮</div>
                <div class="inv">Груз: <span id="e-inv">0</span></div>
            </div>
        </header>

        <main id="map">
            <div class="core-mini">
                <div id="ray"></div>
                <div id="cycle-num">1</div>
            </div>
            <div id="sectors">
                <div class="sector" id="s1"><span>S1</span><div class="units"></div></div>
                <div class="sector" id="s2"><span>S2</span><div class="units"></div></div>
                <div class="sector" id="s3"><span>S3</span><div class="units"></div></div>
                <div class="sector" id="s4"><span>S4</span><div class="units"></div></div>
            </div>
        </main>

        <div id="mini-log">Нажмите на кнопки снизу, чтобы начать...</div>

        <nav class="controls">
            <!-- Кнопки вкладок -->
            <div class="tabs">
                <button onclick="manualAction('buy')">🏢 Купить базу (1к)</button>
                <button onclick="manualAction('work')">⛏️ Добыча</button>
                <button onclick="manualAction('sell')">💰 Продать всё</button>
            </div>
            
            <!-- Постоянная кнопка ИИ -->
            <div class="ai-zone">
                <button id="ai-toggle-btn" onclick="toggleAI()">🤖 ВКЛЮЧИТЬ АВТОПИЛОТ</button>
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
