
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Emoji Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hint">Кликни на гексагон → выбери эмодзи</div>
    
    <div id="selected-info">
        <h3>Редактирование</h3>
        <div>Координаты: <span id="coords">-</span></div>
        <div>Эмодзи: <span id="current-emoji">-</span></div>
        <div>Цвет: <span id="current-color">-</span></div>
        <button onclick="changeEmoji()">Изменить эмодзи</button>
        <button class="delete-btn" onclick="deleteHex()">Удалить</button>
    </div>
    
    <div id="controls">
        <button class="ctrl-btn" onclick="clearAll()">Очистить всё</button>
        <button class="ctrl-btn" onclick="randomFill()">Случайно заполнить</button>
        <button class="ctrl-btn danger" onclick="downloadImage()">Сохранить картинку</button>
    </div>
    
    <div id="canvas-container">
        <canvas id="game"></canvas>
    </div>
    
    <div id="emoji-panel">
        <button class="emoji-btn" data-emoji="⚡">⚡</button>
        <button class="emoji-btn" data-emoji="💎">💎</button>
        <button class="emoji-btn" data-emoji="🏭">🏭</button>
        <button class="emoji-btn" data-emoji="🌱">🌱</button>
        <button class="emoji-btn" data-emoji="⭐">⭐</button>
        <button class="emoji-btn" data-emoji="💧">💧</button>
        <button class="emoji-btn" data-emoji="🔥">🔥</button>
        <button class="emoji-btn" data-emoji="❄️">❄️</button>
        <button class="emoji-btn" data-emoji="🪐">🪐</button>
        <button class="emoji-btn" data-emoji="🚀">🚀</button>
        <button class="emoji-btn" data-emoji="👽">👽</button>
        <button class="emoji-btn" data-emoji="🤖">🤖</button>
        <button class="emoji-btn" data-emoji="💰">💰</button>
        <button class="emoji-btn" data-emoji="🎯">🎯</button>
        <button class="emoji-btn" data-emoji="🔮">🔮</button>
        <button class="emoji-btn" data-emoji="🎲">🎲</button>
        <button class="emoji-btn" data-emoji="💡">💡</button>
        <button class="emoji-btn" data-emoji="🎭">🎭</button>
        <button class="emoji-btn" data-emoji="🌈">🌈</button>
        <button class="emoji-btn" data-emoji="🔔">🔔</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
