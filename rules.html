
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Правила – StarCorp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="rules.css">
</head>
<body>
    <nav class="menu">
        <a href="index.html">Главная</a>
        <a href="rules.html" class="active">Правила</a>
        <a href="settings.html">Настройки</a>
    </nav>

    <main>
        <h1>ПРАВИЛА</h1>
        
        <div class="rule-card">
            <div class="rule-header" onclick="toggleRule(this)">
                <span>Торговля</span>
                <span class="arrow">▼</span>
            </div>
            <div class="rule-content">
                Покупай товары на одной планете и продавай на другой. Зарабатывай разницу в ценах!
            </div>
        </div>

        <div class="rule-card">
            <div class="rule-header" onclick="toggleRule(this)">
                <span>Уровни планет</span>
                <span class="arrow">▼</span>
            </div>
            <div class="rule-content">
                Чем выше уровень планеты — тем больше товаров и выше цены. Открывай новые миры!
            </div>
        </div>
    </main>

    <script>
        function toggleRule(header) {
            header.parentElement.classList.toggle('active');
        }
    </script>
    <footer>
      <p>StarCorp © 2026</p>
    </footer>
</body>
</html>
